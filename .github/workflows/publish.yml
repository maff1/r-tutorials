name: Publish site

on:
  push:
    branches: [main]
    paths-ignore:
      - Dockerfile
      - .dockerignore
      - .github/workflows/container.yml
  workflow_run:
    workflows: ["Build container"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/maff1/r-quarto:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Quarto version
        run: quarto --version

      - name: Check R version
        run: R --version

      - name: Verify required R packages
        run: |
          Rscript -e "cat('tidyverse: ', requireNamespace('tidyverse', quietly = TRUE), '\n')"
          Rscript -e "cat('lme4: ', requireNamespace('lme4', quietly = TRUE), '\n')"
          Rscript -e "cat('cowplot: ', requireNamespace('cowplot', quietly = TRUE), '\n')"
          Rscript -e "cat('ggeffects: ', requireNamespace('ggeffects', quietly = TRUE), '\n')"
          Rscript -e "stopifnot(requireNamespace('tidyverse', quietly = TRUE))"
          Rscript -e "stopifnot(requireNamespace('lme4', quietly = TRUE))"
          Rscript -e "stopifnot(requireNamespace('cowplot', quietly = TRUE))"
          Rscript -e "stopifnot(requireNamespace('ggeffects', quietly = TRUE))"

      - name: Render site
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4